services:
  web2gem:
    image: "${WEB2GEM_IMAGE:-ghcr.io/guardinary/web2gem-account-pool:latest}"
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${PORT:-52389}:${PORT:-52389}"
    environment:
      HOST: "0.0.0.0"
      PORT: "${PORT:-52389}"
      UPSTREAM_SOCKET: "${UPSTREAM_SOCKET:-false}"
      API_KEYS: "${API_KEYS:-}"
      ADMIN_KEY: "${ADMIN_KEY:-}"
      D1_ACCOUNT_ID: "${D1_ACCOUNT_ID:-}"
      D1_DATABASE_ID: "${D1_DATABASE_ID:-}"
      D1_API_TOKEN: "${D1_API_TOKEN:-}"
      GEMINI_BL: "${GEMINI_BL:-}"
      GEMINI_ORIGIN: "${GEMINI_ORIGIN:-}"
      DEFAULT_MODEL: "${DEFAULT_MODEL:-}"
      RETRY_ATTEMPTS: "${RETRY_ATTEMPTS:-}"
      RETRY_DELAY_SEC: "${RETRY_DELAY_SEC:-}"
      REQUEST_TIMEOUT_SEC: "${REQUEST_TIMEOUT_SEC:-}"
      REQUEST_BODY_MAX_BYTES: "${REQUEST_BODY_MAX_BYTES:-67108864}"
      LOG_REQUESTS: "${LOG_REQUESTS:-}"
      CURRENT_INPUT_FILE_ENABLED: "${CURRENT_INPUT_FILE_ENABLED:-}"
      CURRENT_INPUT_FILE_MIN_BYTES: "${CURRENT_INPUT_FILE_MIN_BYTES:-}"
      CURRENT_INPUT_FILE_NAME: "${CURRENT_INPUT_FILE_NAME:-}"
      CURRENT_TOOLS_FILE_NAME: "${CURRENT_TOOLS_FILE_NAME:-}"
      GENERIC_FILE_UPLOAD_MAX_BYTES: "${GENERIC_FILE_UPLOAD_MAX_BYTES:-}"
